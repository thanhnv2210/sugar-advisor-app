version: '3.8'

# PostgreSQL is not managed here — reuse an existing local instance.
# Create the database manually: CREATE DATABASE sugar_advisor;
# Then set DB_HOST, DB_PORT, DB_USER, DB_PASSWORD env vars as needed.

services:
  redis:
    image: redis:7-alpine
    container_name: sugar-advisor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
