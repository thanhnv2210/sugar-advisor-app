spring:
  application:
    name: sugar-advisor-backend

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54320}/${DB_NAME:sugar_advisor}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}

  liquibase:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54320}/${DB_NAME:sugar_advisor}
    user: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: sugar_advisor

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

logging:
  level:
    com.sugaradvisor: DEBUG
    org.springframework.r2dbc: DEBUG
